[platformio]
default_envs = nodemcuv3

[env]
platform = espressif8266
framework = arduino
monitor_speed = 115200
check_tool =
  cppcheck
check_skip_packages = yes
check_flags =
  cppcheck: --enable=warning,style,performance,portability --suppress=noExplicitConstructor
lib_deps =
  adafruit/Adafruit NeoPixel

[env:nodemcuv2]
board = nodemcuv2

[env:nodemcuv3]
# NodeMCU v3 uses the ESP-12E module layout compatible with `nodemcuv2` in
# PlatformIO's board database.
board = nodemcuv2
